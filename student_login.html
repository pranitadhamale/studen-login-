<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
}


.left {
    width: 50%;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center;
    background-size: cover;
    color: white;
    display: flex;
    align-items: flex-end;
    padding: 40px;
}

.left-content {
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 10px;
}

.left h2 {
    margin-bottom: 10px;
}

.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
}

.login-box {
    width: 350px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.login-box h2 {
    margin-bottom: 10px;
}

.login-box p {
    font-size: 14px;
    margin-bottom: 20px;
    color: gray;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #0a3d2c;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #145c42;
}

.links {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 13px;
}

.links a {
    text-decoration: none;
    color: #0a3d2c;
}

#error {
    color: red;
    font-size: 13px;
}
</style>
</head>

<body>


<div class="left">
    <div class="left-content">
        <h2>Welcome Students</h2>
        <p>Access your dashboard, courses, and updates easily.</p>
    </div>
</div>

<div class="right">
    <div class="login-box">
        <h2>Student Login</h2>
        <p>Enter your credentials to continue</p>

        <form onsubmit="return validateForm()">
            <input type="text" id="username" placeholder="Enter Username" required>
            <input type ="email" id="email" placeholder="enter Email" required>
            <input type="password" id="password" placeholder="Enter Password" required>
         
            <a href="forgot.html" target="_blank" class="forgot">forgot password?</a>
            <button type="submit">Login</button>
            <div class="register-link">
            for registration <a href="page2.html" target="_blank">clickhere</a>    
            </div>
        </form>
    </div>
</div>

<script>
function validateForm() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let error = document.getElementById("error");

    if (user === "" || pass === "") {
        error.innerText = "All fields are required!";
        return false;
    }

    if (pass.length < 6) {
        error.innerText = "Password must be at least 6 characters!";
        return false;
    }

    error.innerText = "";
    alert("Login Successful!");
    return true;
}
</script>

</body>
</html>
